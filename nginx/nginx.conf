log_format strangler '$remote_addr - $host "$request" '
                     'status=$status upstream=$upstream_addr '
                     'upstream_status=$upstream_status';

upstream django_v1 {
    server web_django:8000;
}

upstream flask_v2 {
    server pagos_flask:5000;
}

server {
    listen 80;
    access_log /var/log/nginx/access.log strangler;

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location /api/v1/ {
        proxy_pass http://django_v1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location /api/v2/comprar {
        proxy_pass http://flask_v2;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location / {
        proxy_pass http://django_v1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }
}
